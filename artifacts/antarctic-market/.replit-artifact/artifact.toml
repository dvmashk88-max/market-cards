kind = "web"
previewPath = "/"
title = "Antarctic Market"
version = "1.0.0"
id = "artifacts/antarctic-market"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21040

[services.development]
run = "pnpm --filter @workspace/antarctic-market run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/antarctic-market", "run", "build" ]
publicDir = "artifacts/antarctic-market/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21040"
BASE_PATH = "/"
